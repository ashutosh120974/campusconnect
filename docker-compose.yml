services:
  mongo:
    image: mongo:7
    container_name: campusconnect-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: campusconnect-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGODB_URI: mongodb://mongo:27017/campusconnect
      CLIENT_URL: http://localhost:3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: campusconnect-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"

volumes:
  mongo_data:
